<div class="p-4">
  <h2 class="text-2xl font-semibold mb-4">Administrar Usuarios</h2>

  <div class="mb-4 grid gap-4 lg:grid-cols-[1fr_auto]">
    <div class="grid gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Buscar usuario</label>
        <input
          type="text"
          placeholder="Buscar por correo, nombre o id"
          [(ngModel)]="searchTerm"
          class="w-full border rounded-lg px-3 py-2 shadow-sm focus:outline-none focus:border-primario"
        />
      </div>
    </div>
    <div class="flex items-end text-sm text-gray-500">
      {{ filteredUsers.length }} usuario(s) encontrados
    </div>
  </div>

  <div *ngIf="loading" class="text-gray-500">Cargando usuarios...</div>

  <table class="w-full table-auto border-collapse" *ngIf="!loading">
    <thead>
      <tr class="text-left bg-gray-50">
        <th class="px-3 py-2">Usuario</th>
        <th class="px-3 py-2">Correo</th>
        <th class="px-3 py-2">Rol</th>
        <th class="px-3 py-2">Creado</th>
        <th class="px-3 py-2">Acción</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of filteredUsers" class="border-t">
        <td class="px-3 py-2">{{ getUserLabel(u) }}</td>
        <td class="px-3 py-2">{{ u.correo || '-' }}</td>
        <td class="px-3 py-2">
          <select [(ngModel)]="u.role" class="border rounded px-2 py-1 w-full">
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </td>
        <td class="px-3 py-2">{{ formatDate(u.createdAt) }}</td>
        <td class="px-3 py-2">
          <button
            (click)="changeRole(u)"
            [disabled]="isCurrentUser(u)"
            class="bg-blue-600 text-white px-3 py-1 rounded disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Guardar
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && filteredUsers.length === 0" class="mt-4 text-gray-500">
    No se encontraron usuarios con ese término de búsqueda.
  </div>
</div>
