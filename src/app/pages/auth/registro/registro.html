<div class="h-screen w-full overflow-hidden grid lg:grid-cols-2 bg-fondo">
  <section class="hidden lg:flex flex-col justify-between h-full bg-primario p-10 text-white overflow-hidden">
    <div>
      <h1 class="text-4xl font-bold tracking-tight">
        FUNSEMINT
      </h1>
      <p class="mt-4 text-white/80 max-w-md leading-relaxed">
        Crea tu cuenta para comenzar a controlar jornadas, personal y monitoreo operativo.
      </p>
    </div>
    <div class="rounded-premium bg-white/10 p-8 backdrop-blur">
      <h2 class="text-xl font-semibold">
        Registro rápido
      </h2>
      <p class="mt-2 text-white/80 text-sm">
        Usa correo y contraseña para crear tu acceso.
      </p>
    </div>
  </section>

  <section class="flex items-center justify-center h-full p-10 overflow-hidden">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-card p-10">
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-texto">
          Crea tu cuenta
        </h2>
        <p class="text-sm text-gray-500 mt-2">
          Regístrate con correo electrónico y contraseña.
        </p>
      </div>

      <form class="space-y-5" (ngSubmit)="registrarse()">
        <div *ngIf="mensajeError" class="rounded-xl bg-red-50 border border-red-200 p-4 text-sm text-red-700">
          {{ mensajeError }}
        </div>

        <div>
          <label class="text-sm text-gray-600">Correo electrónico</label>
          <div class="relative mt-2">
            <span class="absolute left-4 top-4 text-gray-400">✉️</span>
            <input
              type="email"
              name="correo"
              [(ngModel)]="correo"
              placeholder="correo@empresa.com"
              required
              class="w-full pl-11 pr-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-primario"
            />
          </div>
        </div>

        <div>
          <label class="text-sm text-gray-600">Contraseña</label>
          <div class="relative mt-2">
            <span class="absolute left-4 top-4 text-gray-400">🔒</span>
            <input
              type="password"
              name="password"
              [(ngModel)]="password"
              placeholder="••••••••"
              required
              class="w-full pl-11 pr-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-primario"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-primario hover:bg-secundario transition text-white py-3 rounded-xl font-semibold"
        >
          Registrar cuenta
        </button>

        <!-- DIVIDER -->
        <div class="flex items-center gap-3">
          <div class="h-px bg-gray-200 flex-1"></div>
          <span class="text-xs text-gray-400">o</span>
          <div class="h-px bg-gray-200 flex-1"></div>
        </div>

        <!-- GOOGLE -->
        <button
          type="button"
          (click)="registrarseGoogle()"
          class="w-full flex items-center justify-center gap-2 border py-3 rounded-xl hover:bg-gray-50 transition"
        >
          🔵 Registrarse con Google
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-primario font-medium">
          Inicia sesión
        </a>
      </p>
    </div>
  </section>
</div>
