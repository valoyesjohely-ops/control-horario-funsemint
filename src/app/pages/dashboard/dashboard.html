
<div class="space-y-8">

  <!-- Tarjetas estadísticas -->

  <section class="
      grid
      grid-cols-1
      md:grid-cols-2
      xl:grid-cols-4
      gap-6
    ">

    <app-card-estadistica titulo="Empleados activos" valor="24" descripcion="Trabajadores actualmente en jornada"
      tendencia="+12%" [positiva]="true">
    </app-card-estadistica>

    <app-card-estadistica titulo="Jornadas iniciadas" valor="18" descripcion="Registros iniciados hoy" tendencia="+8%"
      [positiva]="true">
    </app-card-estadistica>

    <app-card-estadistica titulo="Usuarios online" valor="12" descripcion="Conectados al sistema" tendencia="+4%"
      [positiva]="true">
    </app-card-estadistica>

    <app-card-estadistica titulo="Alertas" valor="2" descripcion="Incidencias detectadas" tendencia="-3%"
      [positiva]="false">
    </app-card-estadistica>

  </section>

  <!-- Paneles inferiores -->

  <section class="
      grid
      grid-cols-1
      xl:grid-cols-3
      gap-6
    ">

    <!-- Actividad reciente -->

    <div class="
        xl:col-span-2
        rounded-3xl
        bg-white
        border
        border-gray-100
        p-6
        shadow-suave
      ">

      <div class="
          flex
          items-center
          justify-between
        ">

        <div>

          <h2 class="
              text-lg
              font-semibold
              text-texto
            ">
            Actividad reciente
          </h2>

          <p class="
              mt-1
              text-sm
              text-gray-400
            ">
            Últimos movimientos registrados
          </p>

        </div>

      </div>

      <!-- Lista -->

      <div class="mt-6 space-y-4">

        <div class="
            flex
            items-center
            justify-between
            rounded-2xl
            bg-gray-50
            px-4
            py-4
          ">

          <div>

            <p class="
                font-medium
                text-texto
              ">
              Carlos Rodríguez
            </p>

            <p class="
                mt-1
                text-sm
                text-gray-400
              ">
              Inicio de jornada
            </p>

          </div>

          <span class="
              text-sm
              text-gray-500
            ">
            08:00 AM
          </span>

        </div>

        <div class="
            flex
            items-center
            justify-between
            rounded-2xl
            bg-gray-50
            px-4
            py-4
          ">

          <div>

            <p class="
                font-medium
                text-texto
              ">
              Ana Martínez
            </p>

            <p class="
                mt-1
                text-sm
                text-gray-400
              ">
              Finalizó jornada
            </p>

          </div>

          <span class="
              text-sm
              text-gray-500
            ">
            05:12 PM
          </span>

        </div>

      </div>

    </div>

    <!-- Estado general -->

    <div class="
        rounded-3xl
        bg-white
        border
        border-gray-100
        p-6
        shadow-suave
      ">

      <h2 class="
          text-lg
          font-semibold
          text-texto
        ">
        Estado general
      </h2>

      <p class="
          mt-1
          text-sm
          text-gray-400
        ">
        Resumen del sistema
      </p>

      <div class="mt-8 space-y-5">

        <!-- Item -->

        <div class="
            flex
            items-center
            justify-between
          ">

          <span class="text-sm text-gray-500">
            Empleados presentes
          </span>

          <span class="
              text-sm
              font-semibold
              text-texto
            ">
            24
          </span>

        </div>

        <div class="
            flex
            items-center
            justify-between
          ">

          <span class="text-sm text-gray-500">
            Inactividad detectada
          </span>

          <span class="
              text-sm
              font-semibold
              text-red-600
            ">
            2 casos
          </span>

        </div>

        <div class="
            flex
            items-center
            justify-between
          ">

          <span class="text-sm text-gray-500">
            Sistema monitoreo
          </span>

          <div class="
              flex
              items-center
              gap-2
            ">

            <div class="
                w-2
                h-2
                rounded-full
                bg-green-500
              "></div>

            <span class="
                text-sm
                font-semibold
                text-green-600
              ">
              Activo
            </span>

          </div>

        </div>

      </div>

    </div>

  </section>

  <section>

  <app-tabla-empleados></app-tabla-empleados>

</section>

</div>
