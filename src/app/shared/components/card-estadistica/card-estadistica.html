<div
  class="
    group
    rounded-premium
    border
    border-gray-100
    bg-white
    p-6
    shadow-suave
    transition-all
    duration-300
    hover:-translate-y-1
    hover:shadow-card
  "
>

  <!-- Encabezado -->

  <div
    class="
      flex
      items-start
      justify-between
    "
  >

    <!-- Información -->

    <div>

      <p
        class="
          text-sm
          font-medium
          text-gray-400
        "
      >
        {{ titulo }}
      </p>

      <h3
        class="
          mt-4
          text-4xl
          font-bold
          tracking-tight
          text-texto
        "
      >
        {{ valor }}
      </h3>

    </div>

    <!-- Icono -->

    <div
      class="
        flex
        h-12
        w-12
        items-center
        justify-center
        rounded-2xl
        bg-verdeSuave
        text-primario
        font-bold
        text-lg
      "
    >
      ●
    </div>

  </div>

  <!-- Footer -->

  <div
    class="
      mt-6
      flex
      items-center
      justify-between
    "
  >

    <!-- Descripción -->

    <p
      class="
        text-sm
        text-gray-500
      "
    >
      {{ descripcion }}
    </p>

    <!-- Tendencia -->

    <div
      class="
        rounded-full
        px-3
        py-1
        text-xs
        font-semibold
      "

      [ngClass]="
        positiva
          ? 'bg-green-100 text-green-700'
          : 'bg-red-100 text-red-700'
      "
    >

      {{ tendencia }}

    </div>

  </div>

</div>
