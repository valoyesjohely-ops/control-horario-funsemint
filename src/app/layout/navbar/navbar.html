<header class="
    h-20
    bg-white
    border-b
    border-gray-200
    flex
    items-center
    justify-between
    px-8
  ">

  <!-- Bienvenida -->

  <div>

    <h2 class="
        text-2xl
        font-semibold
        text-texto
      ">
      {{ titulo }}
    </h2>

    <p class="
        text-sm
        text-gray-400
        mt-1
      ">
      {{ subtitulo }}
    </p>

  </div>

  <!-- Usuario -->

  <div class="flex items-center gap-4 relative">

    <!-- Estado -->

    <div class="
      flex
      items-center
      gap-2
      rounded-full
      bg-verdeSuave
      px-4
      py-2
    ">

      <div class="
        w-2
        h-2
        rounded-full
        bg-green-500
      "></div>

      <span class="
        text-sm
        font-medium
        text-primario
      ">
        Sistema activo
      </span>

    </div>

    <!-- Perfil -->

    <button (click)="toggleMenu()" class="
      flex
      items-center
      gap-3
      rounded-2xl
      px-2
      py-1
      hover:bg-gray-100
      transition-all
    ">

      <!-- Avatar -->

      <div class="
        w-11
        h-11
        rounded-full
        bg-primario
        flex
        items-center
        justify-center
        text-white
        font-semibold
      ">
        {{ usuario ? (usuario.nombre.charAt(0) || 'U') : 'U' }}
      </div>

      <!-- Datos -->

      <div class="text-left">

        <p class="
          text-sm
          font-semibold
          text-texto
        ">
          {{ usuario ? usuario.nombre : 'Invitado' }}
        </p>

        <p class="
          text-xs
          text-gray-400
        ">
          {{ usuario ? usuario.rol : 'Invitado' }}
        </p>

      </div>

    </button>

    <!-- Dropdown -->

    <div *ngIf="mostrarMenu" class="
      absolute
      right-0
      top-16
      w-56
      rounded-2xl
      border
      border-gray-200
      bg-white
      shadow-xl
      overflow-hidden
      z-50
    ">

      <ng-container *ngIf="usuario; else noAuth">
        <a routerLink="/perfil" (click)="mostrarMenu = false" class="
          block
          px-5
          py-3
          text-sm
          text-gray-700
          hover:bg-gray-50
        ">
          Mi perfil
        </a>

        <ng-container *hasRole="['admin']">
          <a routerLink="/admin/usuarios" (click)="mostrarMenu = false" class="
            block
            px-5
            py-3
            text-sm
            text-gray-700
            hover:bg-gray-50
          ">
            Panel de administración
          </a>
        </ng-container>

        <button (click)="logout()" class="
          w-full
          text-left
          px-5
          py-3
          text-sm
          text-red-500
          hover:bg-red-50
        ">
          Cerrar sesión
        </button>
      </ng-container>

      <ng-template #noAuth>
        <a routerLink="/login" class="
          block
          px-5
          py-3
          text-sm
          text-primario
          hover:bg-gray-50
        ">
          Iniciar sesión
        </a>
      </ng-template>

    </div>

  </div>

</header>
